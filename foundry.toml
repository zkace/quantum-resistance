[profile.default]
src = "contracts/src"
out = "contracts/out"
libs = ["contracts/lib"]
test = "contracts/test"
script = "contracts/script"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = true

# Canonical invocation root for fixture-backed STARK suites: repo root.
fs_permissions = [{ access = "read", path = "./contracts/test/fixtures" }]

[profile.default.fuzz]
runs = 256
