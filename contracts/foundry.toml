[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = true

# Keep local-contract testing simple; proof-backed STARK fixtures are documented to run from the repo root config.
fs_permissions = [{ access = "read", path = "./test/fixtures" }]

[profile.default.fuzz]
runs = 256
