  - generic [ref=e40]:
    - generic [ref=e41]:
      - heading "The Problem" [level=3] [ref=e42]
      - generic [ref=e43]:
        - heading "ECDSA is quantum-vulnerable" [level=4] [ref=e44]
        - paragraph [ref=e45]: Every EVM wallet relies on elliptic curve signatures. Shor's algorithm on a fault-tolerant quantum computer breaks them completely. Your funds, your NFTs, your DeFi positions — all at risk.
      - generic [ref=e46]:
        - heading "Post-quantum signatures are too large" [level=4] [ref=e47]
        - paragraph [ref=e48]: NIST-standardized PQ signatures (ML-DSA, Falcon) are 2–5 KB per transaction. On rollups where calldata is the bottleneck, this is a 30–40x increase in authorization data.
      - generic [ref=e49]:
        - heading "Migration requires new chains" [level=4] [ref=e50]
        - paragraph [ref=e51]: Existing quantum-resistant projects require abandoning the EVM ecosystem. Users must bridge assets to new L1s, learn new tooling, and trust unaudited infrastructure.
    - generic [ref=e52]:
      - heading "The ZK-ACE Solution" [level=3] [ref=e53]
      - generic [ref=e54]:
        - heading "Zero-knowledge authorization" [level=4] [ref=e55]
        - paragraph [ref=e56]: Instead of signing transactions, you prove in zero knowledge that you know a secret consistent with an on-chain identity commitment. No signature object ever touches the chain.
      - generic [ref=e57]:
        - heading "3.4 KB STARK, not 5 KB lattice signatures" [level=4] [ref=e58]
        - paragraph [ref=e59]: A single STARK proof replaces the entire signature. Hash-only cryptography — no elliptic curves, no pairings, nothing for Shor's algorithm to attack. Uses Keccak256 (EVM-native) and the Goldilocks field for efficient on-chain verification.
      - generic [ref=e60]:
        - heading "Drop-in ERC-4337 module" [level=4] [ref=e61]
        - paragraph [ref=e62]: Works on every EVM chain today. No protocol changes. No new L1. Deploy a vault on Arbitrum, Base, Optimism, or Ethereum mainnet via a single factory call.
  - generic [ref=e63]:
    - text: How It Works
    - heading "Four steps to quantum resistance" [level=2] [ref=e64]
    - paragraph [ref=e65]: From identity creation to authorized transaction, the entire flow uses zero-knowledge proofs with no classical signing keys.
    - generic [ref=e66]:
      - generic [ref=e67]:
        - generic [ref=e68]: Step 01
        - heading "Generate Identity" [level=4] [ref=e69]
        - paragraph [ref=e70]: "Create a 256-bit Root Entropy Value (REV) from OS randomness. Compute your identity commitment: a cryptographic hash anchored on-chain."
        - code [ref=e71]: IDcom = Hash(REV, salt, chainId)
      - generic [ref=e72]:
        - generic [ref=e73]: Step 02
        - heading "Deploy Vault" [level=4] [ref=e74]
        - paragraph [ref=e75]: Call the factory contract with your IDcom. You get a deterministic ERC-4337 smart wallet address — works the same on every EVM chain.
        - code [ref=e76]: factory.createAccount(IDcom, 0)
      - generic [ref=e77]:
        - generic [ref=e78]: Step 03
        - heading "Prove Authorization" [level=4] [ref=e79]
        - paragraph [ref=e80]: To authorize a transaction, generate a STARK proof that you know the REV matching the on-chain IDcom. The proof uses only Keccak256 hashing — no elliptic curves anywhere. Binds to the specific transaction, chain, and nonce.
        - code [ref=e81]: proof = STARK.prove(REV, tx, nonce)
      - generic [ref=e82]:
        - generic [ref=e83]: Step 04
        - heading "Execute On-Chain" [level=4] [ref=e84]
        - paragraph [ref=e85]: The smart contract verifies the STARK proof using native EVM keccak256 and Goldilocks field arithmetic. Checks TxHash, domain, and Merkle commitments, advances the nonce, and executes your transaction.
        - code [ref=e86]: verifier.verifyProof(proof, inputs)
  - generic [ref=e87]:
    - text: Technical Specifications
    - heading "Built for production" [level=2] [ref=e88]
    - paragraph [ref=e89]: Every component is implemented, tested, audited, and deployed. Not a whitepaper — a working system.
    - generic [ref=e90]:
      - generic [ref=e91]:
        - heading "Proof System" [level=4] [ref=e92]
        - generic [ref=e93]: STARK
        - paragraph [ref=e94]: FRI-based (Winterfell). Hash-only — zero elliptic curves. Keccak256 for Merkle trees and Fiat-Shamir. No trusted setup. Fully post-quantum.
      - generic [ref=e95]:
        - heading "Field" [level=4] [ref=e96]
        - generic [ref=e97]: Goldilocks
        - paragraph [ref=e98]:
          - text: p = 2
          - superscript [ref=e99]: "64"
          - text: − 2
          - superscript [ref=e100]: "32"
          - text: + 1. Native 64-bit arithmetic. EVM verification via mulmod/addmod opcodes (8 gas each).
      - generic [ref=e101]:
        - heading "Hash Function" [level=4] [ref=e102]
        - generic [ref=e103]: Keccak256
        - paragraph [ref=e104]: Same hash as the EVM KECCAK256 opcode (30 gas). Merkle verification is native. Quantum-secure as a symmetric primitive (128-bit post-quantum).
      - generic [ref=e105]:
        - heading "Proof Size" [level=4] [ref=e106]
        - generic [ref=e107]: 43.8 KB
        - paragraph [ref=e108]: 44 FRI queries, blowup factor 8, quadratic extension field. 132-bit soundness with 20-bit grinding. Compact for a transparent proof system.
      - generic [ref=e109]:
        - heading "Verification Cost" [level=4] [ref=e110]
        - generic [ref=e111]: ~$0.20
        - paragraph [ref=e112]: 5.6M gas on Arbitrum One with full algebraic verification (Fiat-Shamir + OOD constraints + DEEP composition + Merkle + remainder). The only deployed PQ verification on any EVM chain.
      - generic [ref=e113]:
        - heading "Test Coverage" [level=4] [ref=e114]
        - generic [ref=e115]: "90"
        - paragraph [ref=e116]: Tests across Rust (32) and Solidity (73) including STARK E2E with real proofs. Circuit soundness, field arithmetic, Merkle verification, Fiat-Shamir cross-validation, replay prevention.
